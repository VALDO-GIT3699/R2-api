services:
  - type: web
    name: r2-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "30"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_UPLOAD_MB
        value: "8"
      - key: APPLE_AUDIENCE
        sync: false
      - key: EMAIL_CHECK_DELIVERABILITY
        value: "true"
